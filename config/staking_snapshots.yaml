# Staking / Lasernet manual snapshot log.
#
# No reliable free public API is wired up in v1, so enter readings by hand
# from the DIA staking dashboard / Lasernet explorer. Add a new entry each
# time you check; the tool computes deltas between the two most recent.
#
# Fields per snapshot:
#   date              : YYYY-MM-DD
#   total_dia_staked  : DIA tokens staked (number)
#   feeders           : number of Feeders securing oracle ops
#   apy               : staking APY (percent, e.g. 7.5)
#   lasernet_tx_count : cumulative or period Lasernet tx count (if available)
#   source            : URL / dashboard you read it from
#   notes             : free text
#
# The example rows let the report render and show a delta. Replace them.

snapshots:
  - date: "2025-06-24"
    total_dia_staked: 2000000
    feeders: null
    apy: null
    lasernet_tx_count: null
    source: "https://www.diadata.org/blog/post/mainnet-staking-blockchain-oracle-grants/"
    notes: "Mainnet staking + Oracle Grants launch: ~2M DIA released to secure Lasernet. Feeder count/APY at launch not separately verified (bootstrapping phase; Genesis staking offered up to 30% in late 2024)."

  - date: "2026-06-05"
    total_dia_staked: 4400000
    feeders: 11
    apy: 12.56
    lasernet_tx_count: null
    source: "https://www.diadata.org/blog/post/update-on-dia-staking/"
    notes: "4.4M DIA staked, 11+ Feeders across 60+ chains (Liquify, Chainbase, Stakecraft, Globalstake, Blockscape, Aleno, Swyke, Stakin). APY 12.56% is the live app reading on 2026-06-12; recalibrates to ~5-6% on 2026-07-01. Lasernet tx count not publicly exposed -> null."
