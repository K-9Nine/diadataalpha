# Official DIA oracle Total Value Secured (TVS), from DefiLlama.
#
# WHY THIS EXISTS: the tool's "DIA-linked TVL proxy" (config/protocols.yaml) sums
# the WHOLE TVL of protocols that use DIA somewhere — it is an upper bound on
# *reach*, not the value DIA actually secures, and it overstates real TVS by
# ~16-76x. DefiLlama computes the real per-oracle TVS (only the markets/pools a
# given oracle actually secures). The /oracles API is paywalled (DefiLlama Pro),
# so we record the public figure here manually.
#
# VERIFY FREE (no account) at: https://defillama.com/oracles/DIA
#
# NOTE: this is now a FALLBACK only. With a DEFILLAMA_API_KEY set, the tool fetches
# the live per-oracle TVS series (+ history) from the Pro /api/oracles endpoint
# (see defillama_pro.py) and the report prefers it over this manual figure. Keep
# this roughly current for runs without a key. Values below refreshed from the
# live Pro reading on the as_of date.

defillama_tvs_usd: 112480000
source: "https://defillama.com/oracles/DIA"
as_of: "2026-06-13"
top_protocols: "Zest V2 ~63% (Stacks), Hydration Lending ~25% (Polkadot); top-2 ≈ 88%"
note: "Real value DIA's oracles secure. Compare to mcap for an adoption-vs-price read. Highly concentrated — see ANALYSIS.md §3."
